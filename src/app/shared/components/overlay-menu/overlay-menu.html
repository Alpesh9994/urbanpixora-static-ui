    <!-- Content: two columns -->
    <div class="nav-overlay__body">

        <!-- Left: Primary nav -->
        <nav class="nav-overlay__primary" role="navigation" aria-label="Main navigation">
            @for (link of navLinks; track link.label) {
            <a class="nav-overlay__link" [class.is-active]="link.path ? isActive(link.path) : false"
                [href]="link.path || '#'" (click)="handleClick(link, $event)" @itemAnim>
                {{ link.label }}
            </a>
            }
        </nav>

        <!-- Right: Utility columns -->
        <aside class="nav-overlay__aside" @itemAnim>

            <!-- Useful links -->
            <div class="nav-overlay__util">
                <p class="nav-overlay__util-title">Useful links</p>
                <a class="nav-overlay__util-link" routerLink="/privacy" (click)="menuState.close()">Privacy Policy</a>
                <a class="nav-overlay__util-link" routerLink="/terms" (click)="menuState.close()">Terms and

                <a class="nav-overlay__util-link" routerLink="/cookies" (click)="menuState.close()">Cookie Policy</a>
