<header class="site-header" [ngClass]="headerClass">

  <!-- Brand -->
  <a class="site-header__brand" routerLink="/" aria-label="UrbanPixora home">
    <svg class="site-header__logo" viewBox="0 0 120 32" fill="none" xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true">
      <!-- U -->
      <path d="M4 4v16a8 8 0 0 0 16 0V4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
      <!-- P mark -->
      <circle cx="36" cy="16" r="5" stroke="currentColor" stroke-width="2.5" />
      <line x1="31" y1="4" x2="31" y2="28" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
      <!-- wordmark -->
      <text x="48" y="21" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="currentColor"
        letter-spacing="0.5">rbanPixora</text>
    </svg>
  </a>

  <!-- Hamburger toggle -->
  <button class="btn-circle site-header__toggle" [class.is-open]="menuState.isOpen()" (click)="menuState.toggle()"
    aria-label="Toggle navigation menu" [attr.aria-expanded]="menuState.isOpen()">
    <span class="hamburger">
      <span class="hamburger__line hamburger__line--top"></span>
      <span class="hamburger__line hamburger__line--mid"></span>
      <span class="hamburger__line hamburger__line--bot"></span>
    </span>
  </button>

</header>
