[build]
  command   = "npm run build"
  publish   = "dist/urbanpixora-new/browser"

[build.environment]
  NODE_VERSION = "20"

# ── SPA fallback — required for Angular client-side routing ──
# Without this, refreshing /about, /services, /contact etc.
# would return a 404 from Netlify's CDN.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
